providers = ["node"]

[variables]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10.5.2 --activate",
  "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = ["pnpm --filter @courrier/relay... build"]

[start]
cmd = "pnpm --filter @courrier/relay start"
